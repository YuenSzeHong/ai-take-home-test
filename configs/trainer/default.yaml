_target_: pytorch_lightning.Trainer

# Use 'cpu' for CPU, 'gpu' for GPU
accelerator: gpu
devices: 1

enable_model_summary: null
enable_progress_bar: true

# Mixed precision for Tensor Core acceleration (RTX 5070 Ti)
precision: bf16-mixed

max_epochs: 20

# Validate every N epochs (skips expensive val pass every epoch)
check_val_every_n_epoch: 5
